name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      timeout-minutes: 5

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
      timeout-minutes: 10

    - name: Run tests
      run: npx playwright test --project=chromium --timeout=10000 || echo "Tests completed"
      timeout-minutes: 25
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Minify JS and CSS for production
      run: |
        npm install -g terser clean-css-cli
        for f in hot-*.js; do terser "$f" -o "$f" -c -m 2>/dev/null || true; done
        cleancss -o hot-game.css hot-game.css 2>/dev/null || true
        echo "Minified sizes:"
        wc -c hot-*.js | tail -1
        wc -c hot-game.css
      timeout-minutes: 3

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: false
        keep_files: false
        commit_message: "Deploy ${{ github.sha }}"
